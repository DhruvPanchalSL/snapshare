<!DOCTYPE html>
<html>
<head>
    <base href="$FLUTTER_BASE_HREF">
    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="SnapShare — Instant file sharing">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="SnapShare">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" href="icons/Icon-192.png">
    <link rel="icon" type="image/png" href="favicon.png"/>
    <title>SnapShare</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap');
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #0a0a12; overflow: hidden; }

        #loader {
          position: fixed; inset: 0;
          display: flex; flex-direction: column;
          align-items: center; justify-content: center;
          background: #0a0a12; z-index: 9999;
          transition: opacity 0.4s ease;
        }
        #loader.fade-out { opacity: 0; pointer-events: none; }

        .wordmark {
          font-family: 'DM Sans', sans-serif;
          font-weight: 500; font-size: 15px;
          letter-spacing: 0.18em; text-transform: uppercase;
          color: rgba(255,255,255,0.88);
          opacity: 0; animation: appear 0.6s ease 0.1s forwards;
        }
        .line-container {
          margin-top: 20px; width: 28px; height: 1px;
          background: rgba(255,255,255,0.07); border-radius: 1px; overflow: hidden;
          opacity: 0; animation: appear 0.4s ease 0.4s forwards;
        }
        .line-fill {
          height: 100%; width: 0%;
          background: linear-gradient(90deg, #7C3AED, #00C896);
          animation: fill 3s cubic-bezier(0.4,0,0.2,1) 0.5s forwards;
        }
        @keyframes appear {
          from { opacity: 0; transform: translateY(3px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fill {
          0%  { width: 0%; } 80% { width: 88%; } 100% { width: 100%; }
        }
    </style>
</head>
<body>
<div id="loader">
    <span class="wordmark">SnapShare</span>
    <div class="line-container"><div class="line-fill"></div></div>
</div>

<script>
    window.addEventListener('flutter-first-frame', function () {
      const loader = document.getElementById('loader');
      loader.classList.add('fade-out');
      setTimeout(() => loader.remove(), 500);
    });
</script>

<!-- Force HTML renderer — much faster, no CanvasKit download -->
<script>
    window.flutterConfiguration = {
      renderer: "html"
    };
</script>

<script src="flutter_bootstrap.js" async></script>
</body>
</html>
