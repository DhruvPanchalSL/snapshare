<!DOCTYPE html>
<html>
<head>
    <base href="$FLUTTER_BASE_HREF">
    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="SnapShare — Instant file sharing">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="SnapShare">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" href="icons/Icon-192.png">
    <link rel="icon" type="image/png" href="favicon.png"/>
    <title>SnapShare</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap');

        *, *::before, *::after {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        html, body {
          width: 100%;
          height: 100%;
          background: #08080f;
          overflow: hidden;
        }

        #loader {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: #08080f;
          z-index: 9999;
          transition: opacity 0.5s ease;
        }

        #loader.fade-out {
          opacity: 0;
          pointer-events: none;
        }

        .wordmark {
          font-family: 'DM Sans', sans-serif;
          font-weight: 500;
          font-size: 15px;
          letter-spacing: 0.18em;
          text-transform: uppercase;
          color: rgba(255, 255, 255, 0.88);
          opacity: 0;
          animation: appear 0.7s ease 0.15s forwards;
        }

        .line-container {
          margin-top: 24px;
          width: 28px;
          height: 1px;
          background: rgba(255, 255, 255, 0.07);
          border-radius: 1px;
          overflow: hidden;
          opacity: 0;
          animation: appear 0.4s ease 0.5s forwards;
        }

        .line-fill {
          height: 100%;
          width: 0%;
          background: linear-gradient(90deg, #6C63FF, #00C896);
          border-radius: 1px;
          animation: fill 3.5s cubic-bezier(0.4, 0, 0.15, 1) 0.7s forwards;
        }

        @keyframes appear {
          from { opacity: 0; transform: translateY(4px); }
          to   { opacity: 1; transform: translateY(0);   }
        }

        @keyframes fill {
          0%   { width: 0%;   }
          70%  { width: 80%;  }
          95%  { width: 96%;  }
          100% { width: 100%; }
        }
    </style>
</head>
<body>

<div id="loader">
    <span class="wordmark">SnapShare</span>
    <div class="line-container">
        <div class="line-fill"></div>
    </div>
</div>

<script>
    window.addEventListener('flutter-first-frame', function () {
      const loader = document.getElementById('loader');
      loader.classList.add('fade-out');
      setTimeout(() => loader.remove(), 600);
    });
</script>

<script src="flutter_bootstrap.js" async></script>
</body>
</html>
